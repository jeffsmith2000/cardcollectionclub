[build]
  publish = "."
  command = "echo 'static site'"

[build.environment]
  NETLIFY_SKIP_FRAMEWORK_DETECTION = "true"

[dev]
  framework = "#static"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[redirects]]
  from = "/jp-card/*"
  to = "https://www.onepiece-cardgame.com/images/cardlist/card/:splat"
  status = 200
  force = true
